# Dujiao-Next (AIO) 生产环境默认配置文件
# 此配置已经默认适配了外部挂载的 PostgreSQL 和 Redis 容器

server:
  host: 0.0.0.0
  port: 8080
  mode: release  # 生产模式

log:
  dir: "/app/logs"
  filename: app.log
  max_size_mb: 100
  max_backups: 7
  max_age_days: 30
  compress: true

database:
  driver: postgres  # 默认使用 Postgres
  # 这里的 host 必须填 docker-compose 中的 service 名称 dujiao-db
  dsn: "host=dujiao-db user=dujiao password=secret_password dbname=dujiao_db port=5432 sslmode=disable TimeZone=Asia/Shanghai"
  pool:
    max_open_conns: 50
    max_idle_conns: 10
    conn_max_lifetime_seconds: 3600
    conn_max_idle_time_seconds: 1800

jwt:
  secret: b3a4f8e7d2c1945a8f0c3d2e1b4a5f6e8d7c9b0a1f2e3d4c
  expire_hours: 24

user_jwt:
  secret: d9c8b7a6e5f4d3c2b1a0f9e8d7c6b5a4f3e2d1c0b9a8f7e6
  expire_hours: 24
  remember_me_expire_hours: 168

bootstrap:
  default_admin_username: "admin"
  default_admin_password: "admin123456"

telegram_auth:
  enabled: false
  bot_username: ""
  bot_token: ""
  mini_app_url: ""
  login_expire_seconds: 300
  replay_ttl_seconds: 300

redis:
  enabled: true
  host: dujiao-redis  # 对应 compose 里的 Redis 容器名
  port: 6379
  password: ""
  db: 0
  prefix: "dj"

queue:
  enabled: true
  host: dujiao-redis  # 对应 compose 里的 Redis 容器名
  port: 6379
  password: ""
  db: 1
  concurrency: 10
  queues:
    default: 10
    critical: 5

upload:
  max_size: 10485760
  allowed_types:
    - image/jpeg
    - image/png
    - image/gif
    - image/webp
    - image/svg+xml
  allowed_extensions:
    - .jpg
    - .jpeg
    - .png
    - .gif
    - .webp
    - .svg
  max_width: 4096
  max_height: 4096

cors:
  allowed_origins:
    - "*"
  allowed_methods:
    - GET
    - POST
    - PUT
    - PATCH
    - DELETE
    - OPTIONS
  allowed_headers:
    - Content-Type
    - Content-Length
    - Accept-Encoding
    - Authorization
    - Cache-Control
    - X-Requested-With
    - X-CSRF-Token
  allow_credentials: true
  max_age: 600

security:
  login_rate_limit:
    window_seconds: 300
    max_attempts: 5
    block_seconds: 900
  password_policy:
    min_length: 8
    require_upper: true
    require_lower: true
    require_number: true
    require_special: false

email:
  enabled: false
  host: smtp.xxx.com
  port: 465
  username: your-username
  password: your-password
  from: your-email
  from_name: your-name
  use_tls: false
  use_ssl: true
  verify_code:
    expire_minutes: 10
    send_interval_seconds: 60
    max_attempts: 5
    length: 6

order:
  payment_expire_minutes: 15
